<div class="dashboard">
  <div class="dashboard__background">
    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>
    <div class="orb orb--3"></div>
  </div>

  <div class="dashboard__content">
    <header class="dashboard__header">
      <div class="dashboard__logo">
        <svg xmlns="http://www.w3.org/2000/svg" height="32" viewBox="0 -960 960 960" width="32" fill="currentColor">
          <path d="M120-160v-640l760 320-760 320Zm80-120 474-200-474-200v140l240 60-240 60v140Zm0 0v-400 400Z"/>
        </svg>
      </div>
      <h1 class="dashboard__title">Posts Dashboard</h1>
      <p class="dashboard__subtitle">Search and explore posts from the JSON Placeholder API</p>
    </header>

    <section class="dashboard__search">
      <app-post-search-bar (search)="onSearch($event)" />
    </section>

    @if (isLoading()) {
      <div class="dashboard__loading" aria-live="polite" aria-label="Loading post">
        <div class="spinner"></div>
        <p>Fetching post...</p>
      </div>
    }

    @if (hasError()) {
      <div class="dashboard__error" role="alert">
        <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24" fill="currentColor">
          <path d="M480-280q17 0 28.5-11.5T520-320q0-17-11.5-28.5T480-360q-17 0-28.5 11.5T440-320q0 17 11.5 28.5T480-280Zm-40-160h80v-240h-80v240Zm40 360q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/>
        </svg>
        <span>{{ errorMessage() }}</span>
      </div>
    }

    @if (currentPost()) {
      <section class="dashboard__result">
        <app-post-detail [post]="currentPost()!" />
      </section>
    }

    <section class="dashboard__table-section">
      <h2 class="dashboard__section-title">All Posts</h2>
      <app-post-table [posts]="allPosts()" [loading]="isLoadingAllPosts()" />
    </section>
  </div>
</div>
