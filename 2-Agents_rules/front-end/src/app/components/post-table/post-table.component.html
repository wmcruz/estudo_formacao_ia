@if (loading) {
  <div class="table-loading">
    <mat-spinner diameter="40" />
    <p>Loading posts...</p>
  </div>
} @else {
  <div class="table-container">
    <table mat-table [dataSource]="dataSource" class="post-table">

      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let post">{{ post.id }}</td>
      </ng-container>

      <ng-container matColumnDef="userId">
        <th mat-header-cell *matHeaderCellDef>User</th>
        <td mat-cell *matCellDef="let post">{{ post.userId }}</td>
      </ng-container>

      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef>Title</th>
        <td mat-cell *matCellDef="let post">{{ post.title }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    <mat-paginator
      [pageSizeOptions]="[5, 10, 25, 50]"
      [pageSize]="10"
      showFirstLastButtons
      aria-label="Selecionar página de posts">
    </mat-paginator>
  </div>
}
