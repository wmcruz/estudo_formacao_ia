<div class="detail-card">
  <div class="detail-card__header">
    <span class="detail-card__badge">#{{ post().id }}</span>
    <h2 class="detail-card__title">{{ post().title }}</h2>
  </div>
  <p class="detail-card__body">{{ post().body }}</p>
  <div class="detail-card__footer">
    <span class="detail-card__info">User ID: {{ post().userId }}</span>
  </div>
</div>
